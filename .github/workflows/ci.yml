name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  brew-audit-and-test:
    runs-on: macos-14
    steps:
      - name: Check out tap
        uses: actions/checkout@v4

      - name: Tap from local checkout
        run: |
          TAP_DIR="$(brew --repository)/Library/Taps/${GITHUB_REPOSITORY_OWNER}/homebrew-tap"
          mkdir -p "$(dirname "${TAP_DIR}")"
          ln -s "${GITHUB_WORKSPACE}" "${TAP_DIR}"

      - name: Audit formula
        run: brew audit --strict agentspec

      - name: Install formula
        run: brew install --build-from-source agentspec || brew install agentspec

      - name: Test formula
        run: brew test agentspec
